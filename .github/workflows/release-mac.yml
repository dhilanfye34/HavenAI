name: Release Mac Desktop

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and upload, e.g. v0.1.5"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-mac:
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches package version
        run: |
          set -euo pipefail
          tag_version="${RELEASE_TAG#v}"
          package_version="$(node -p "require('./desktop-app/electron/package.json').version")"
          if [ "$package_version" != "$tag_version" ]; then
            echo "Tag version v$tag_version does not match desktop-app/electron/package.json version $package_version." >&2
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            webapp/package-lock.json
            desktop-app/electron/package-lock.json
            desktop-app/electron/renderer/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Electron dependencies
        run: npm ci
        working-directory: desktop-app/electron

      - name: Install renderer dependencies
        run: npm ci
        working-directory: desktop-app/electron/renderer

      - name: Install webapp dependencies
        run: npm ci
        working-directory: webapp

      - name: Prepare agent virtualenv
        run: |
          python -m venv desktop-app/agent/venv
          desktop-app/agent/venv/bin/python -m pip install --upgrade pip
          desktop-app/agent/venv/bin/python -m pip install -r desktop-app/agent/requirements.txt pyinstaller

      - name: Build bundled agent
        run: npm run build:agent
        working-directory: desktop-app/electron

      - name: Build Electron app
        run: npm run build
        working-directory: desktop-app/electron

      - name: Package Mac app
        run: npx electron-builder --mac --publish never
        working-directory: desktop-app/electron

      - name: Upload Mac assets to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            desktop-app/electron/release/*.dmg
            desktop-app/electron/release/*.zip
            desktop-app/electron/release/latest-mac.yml
          fail_on_unmatched_files: true

      - name: Verify release artifacts
        run: |
          set -euo pipefail

          release_dir="desktop-app/electron/release"
          if [ ! -d "$release_dir" ]; then
            echo "Release directory not found: $release_dir" >&2
            exit 1
          fi

          dmg="$(find "$release_dir" -maxdepth 1 -type f -name "*.dmg" | head -n 1 || true)"
          if [ -z "$dmg" ]; then
            echo "Expected DMG artifact *.dmg was not produced." >&2
            exit 1
          fi

          zip="$(find "$release_dir" -maxdepth 1 -type f -name "*.zip" | head -n 1 || true)"
          if [ -z "$zip" ]; then
            echo "Expected ZIP artifact *.zip was not produced." >&2
            exit 1
          fi

          mac_metadata="$(find "$release_dir" -maxdepth 1 -type f \( -name "latest-mac.yml" -o -name "*mac*.yml" \) | head -n 1 || true)"
          if [ -z "$mac_metadata" ]; then
            echo "Expected Mac updater metadata (e.g. latest-mac.yml) was not produced." >&2
            exit 1
          fi

          echo "Validated artifacts:"
          echo " - $(basename "$dmg")"
          echo " - $(basename "$zip")"
          echo " - $(basename "$mac_metadata")"
