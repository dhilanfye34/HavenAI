name: Release Linux Desktop

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and upload, e.g. v0.1.5"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-linux:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches package version
        run: |
          set -euo pipefail
          tag_version="${RELEASE_TAG#v}"
          package_version="$(node -p "require('./desktop-app/electron/package.json').version")"
          if [ "$package_version" != "$tag_version" ]; then
            echo "Tag version v$tag_version does not match desktop-app/electron/package.json version $package_version." >&2
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            webapp/package-lock.json
            desktop-app/electron/package-lock.json
            desktop-app/electron/renderer/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Electron dependencies
        run: npm ci
        working-directory: desktop-app/electron

      - name: Install renderer dependencies
        run: npm ci
        working-directory: desktop-app/electron/renderer

      - name: Install webapp dependencies
        run: npm ci
        working-directory: webapp

      - name: Prepare agent virtualenv
        run: |
          python -m venv desktop-app/agent/venv
          desktop-app/agent/venv/bin/python -m pip install --upgrade pip
          desktop-app/agent/venv/bin/python -m pip install -r desktop-app/agent/requirements.txt pyinstaller

      - name: Build bundled agent
        run: npm run build:agent
        working-directory: desktop-app/electron

      - name: Build Electron app
        run: npm run build
        working-directory: desktop-app/electron

      - name: Package Linux app
        run: npx electron-builder --linux --publish never
        working-directory: desktop-app/electron

      - name: Upload Linux assets to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            desktop-app/electron/release/HavenAI-*.AppImage
            desktop-app/electron/release/*.deb
            desktop-app/electron/release/latest-linux.yml
          fail_on_unmatched_files: true

      - name: Verify release artifacts
        run: |
          set -euo pipefail

          release_dir="desktop-app/electron/release"
          if [ ! -d "$release_dir" ]; then
            echo "Release directory not found: $release_dir" >&2
            exit 1
          fi

          appimage="$(find "$release_dir" -maxdepth 1 -type f -name "HavenAI-*.AppImage" | head -n 1 || true)"
          if [ -z "$appimage" ]; then
            echo "Expected AppImage artifact HavenAI-*.AppImage was not produced." >&2
            exit 1
          fi

          linux_metadata="$(find "$release_dir" -maxdepth 1 -type f \( -name "latest-linux.yml" -o -name "*linux*.yml" \) | head -n 1 || true)"
          if [ -z "$linux_metadata" ]; then
            echo "Expected Linux updater metadata (e.g. latest-linux.yml) was not produced." >&2
            exit 1
          fi

          echo "Validated artifacts:"
          echo " - $(basename "$appimage")"
          echo " - $(basename "$linux_metadata")"
